name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_INTEREST_FORM_ENDPOINT: https://jztkgrm3lh.execute-api.ap-southeast-1.amazonaws.com/submit-interest
          NEXT_PUBLIC_SITE_URL: https://main.d2mrph1bcp6pjx.amplifyapp.com
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: 0x4AAAAAAD0posjeQ2nKduks
          NEXT_PUBLIC_API_BASE_URL: https://jztkgrm3lh.execute-api.ap-southeast-1.amazonaws.com

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # e2e/*.spec.ts mock every call to the interest-form API (see the comments in those
      # files) instead of hitting the live Lambda, so this is safe to run unattended on every
      # push/PR — it drives a real `next dev` server (playwright.config.ts's webServer), not
      # just static analysis.
      - name: Run e2e tests
        run: npm test
