name: Deploy interest-form Lambda

on:
  push:
    branches: [main]
    paths:
      - "backend/interest-form/**"
      - ".github/workflows/deploy-interest-form-lambda.yml"

permissions:
  id-token: write # required for OIDC -> AWS
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/interest-form
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install production dependencies
        run: npm ci --omit=dev

      - name: Zip function
        run: zip -qr function.zip index.mjs node_modules package.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::140023398409:role/seads-gha-lambda-deploy
          aws-region: ap-southeast-1

      - name: Update Lambda code
        run: |
          aws lambda update-function-code \
            --function-name seads-interest-form-handler \
            --zip-file fileb://function.zip
