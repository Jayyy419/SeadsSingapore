name: Deploy interest-form Lambda

on:
  push:
    branches: [main]
    paths:
      - "backend/interest-form/**"
      - ".github/workflows/deploy-interest-form-lambda.yml"

permissions:
  id-token: write # required for OIDC -> AWS
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/interest-form
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "20"

      # A syntax error here (e.g. a duplicate top-level `const` — this has happened before in
      # this repo) would previously have gone straight to the live Lambda on the next step with
      # no gate at all. `node --check` parses the file without running it, so this catches that
      # class of mistake in seconds instead of as a production outage.
      - name: Syntax check
        run: node --check index.mjs

      - name: Install production dependencies
        run: npm ci --omit=dev

      - name: Zip function
        run: zip -qr function.zip index.mjs node_modules package.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::140023398409:role/seads-gha-lambda-deploy
          aws-region: ap-southeast-1

      - name: Update Lambda code
        run: |
          aws lambda update-function-code \
            --function-name seads-interest-form-handler \
            --zip-file fileb://function.zip
